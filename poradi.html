<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MS 2026 – Pořadí</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

    .topbar { background: #0F6E56; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 22px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
    .topbar-title { font-size: 18px; font-weight: 700; }

    .content { max-width: 640px; margin: 0 auto; padding: 1rem; }
    .updated { text-align: center; font-size: 12px; color: #aaa; margin: 0.5rem 0 1rem; }

    .summary-card { background: #0F6E56; color: #fff; border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .summary-left { display: flex; align-items: center; gap: 1rem; }
    .summary-rank { font-size: 38px; font-weight: 900; line-height: 1; flex-shrink: 0; }
    .summary-name { font-size: 17px; font-weight: 600; }
    .summary-pts { font-size: 36px; font-weight: 900; text-align: right; flex-shrink: 0; }
    .summary-pts span { display: block; font-size: 13px; font-weight: 400; opacity: 0.7; text-align: right; }

    .table-card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 5px rgba(0,0,0,0.08); }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    table { width: 100%; border-collapse: collapse; min-width: 320px; }
    thead tr { background: #f8f8f8; border-bottom: 1.5px solid #e0e0e0; }
    thead th { padding: 10px 6px; font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; white-space: nowrap; }
    thead th.col-name { text-align: left; padding-left: 4px; }

    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr.me { background: #f0faf6; }
    tbody tr.top1 { background: #fffbea; }

    tbody td { padding: 11px 6px; text-align: center; vertical-align: middle; }
    tbody td.col-rank { font-size: 14px; font-weight: 700; color: #888; white-space: nowrap; width: 32px; }
    tbody td.col-rank.r1 { color: #f0a500; }
    tbody td.col-rank.r2 { color: #999; }
    tbody td.col-rank.r3 { color: #cd7f32; }
    tbody td.col-name { text-align: left; padding-left: 4px; max-width: 140px; }
    tbody td.col-name .lastname { font-size: 14px; font-weight: 700; color: #1a1a1a; }
    tbody td.col-name .firstname { font-size: 13px; font-weight: 400; color: #888; margin-left: 4px; }
    tbody td.col-pts { font-size: 17px; font-weight: 900; color: #0F6E56; width: 48px; }
    tbody td.col-sub { font-size: 13px; font-weight: 600; color: #888; width: 32px; }

    .loading { text-align: center; padding: 3rem; color: #888; }
    .empty { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='menu.html'">&#8249;</button>
  <div class="topbar-title">📊 Pořadí</div>
</div>

<div class="content">
  <div id="mySummary"></div>
  <div class="updated" id="updatedAt"></div>
  <div class="table-card">
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-rank">#</th>
          <th class="col-name">Hráč</th>
          <th>Body</th>
          <th>5b</th>
          <th>3b</th>
          <th>1b</th>
        </tr>
      </thead>
      <tbody id="rankingList">
        <tr><td colspan="6" class="loading">Načítám pořadí...</td></tr>
      </tbody>
    </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fizffhtzxjkeighdjhoi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpemZmaHR6eGprZWlnaGRqaG9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MjU1MDYsImV4cCI6MjA5NjIwMTUwNn0.baa-qYiKNsPRgwyiDvmQ9hq8QNmCuHXebZ-tvldcVYs';

const user = JSON.parse(sessionStorage.getItem('ms2026_user'));
if (!user) window.location.href = 'index.html';

async function apiFetch(path) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } });
  return await res.json();
}

function splitName(full) {
  const parts = full.trim().split(' ');
  if (parts.length === 1) return { first: '', last: parts[0] };
  return { first: parts.slice(0, parts.length - 1).join(' '), last: parts[parts.length - 1] };
}

async function loadRanking() {
  const [users, tips, specialTips] = await Promise.all([
    apiFetch('users?select=id,full_name&is_admin=eq.false&order=full_name.asc'),
    apiFetch('tips?select=user_id,points'),
    apiFetch('special_tips?select=user_id,winner_points,scorer_points')
  ]);

  if (!Array.isArray(users)) { document.getElementById('rankingList').innerHTML = '<div class="empty">Nepodařilo se načíst data.</div>'; return; }

  const ptsMap = {}, pts5 = {}, pts3 = {}, pts1 = {};
  users.forEach(u => { ptsMap[u.id] = 0; pts5[u.id] = 0; pts3[u.id] = 0; pts1[u.id] = 0; });

  if (Array.isArray(tips)) tips.forEach(t => {
    if (t.points === null || !ptsMap.hasOwnProperty(t.user_id)) return;
    ptsMap[t.user_id] += t.points;
    if (t.points === 5) pts5[t.user_id]++;
    else if (t.points === 3) pts3[t.user_id]++;
    else if (t.points === 1) pts1[t.user_id]++;
  });

  if (Array.isArray(specialTips)) specialTips.forEach(s => {
    if (!ptsMap.hasOwnProperty(s.user_id)) return;
    if (s.winner_points) ptsMap[s.user_id] += s.winner_points;
    if (s.scorer_points) ptsMap[s.user_id] += s.scorer_points;
  });

  const ranked = users.map(u => ({ id: u.id, name: u.full_name, pts: ptsMap[u.id]||0, p5: pts5[u.id]||0, p3: pts3[u.id]||0, p1: pts1[u.id]||0 }))
    .sort((a, b) => b.pts-a.pts || b.p5-a.p5 || b.p3-a.p3 || b.p1-a.p1);

  let rank = 1;
  ranked.forEach((p, i) => {
    if (i > 0) { const prev = ranked[i-1]; if (p.pts!==prev.pts||p.p5!==prev.p5||p.p3!==prev.p3||p.p1!==prev.p1) rank=i+1; }
    p.rank = rank;
  });

  const me = ranked.find(p => p.id === user.id);
  if (me) {
    const medal = me.rank===1?'🥇':me.rank===2?'🥈':me.rank===3?'🥉':me.rank+'.';
    document.getElementById('mySummary').innerHTML =
      '<div class="summary-card">'
      + '<div class="summary-left"><div class="summary-rank">' + medal + '</div><div class="summary-name">' + me.name + '</div></div>'
      + '<div class="summary-pts">' + me.pts + '<span>bodů</span></div>'
      + '</div>';
  }

  document.getElementById('updatedAt').textContent = 'Aktualizováno: ' + new Date().toLocaleString('cs-CZ', { day:'numeric', month:'numeric', hour:'2-digit', minute:'2-digit' });

  if (!ranked.length) { document.getElementById('rankingList').innerHTML = '<tr><td colspan="6" class="empty">Zatím žádní hráči.</td></tr>'; return; }

  let html = '';
  ranked.forEach(p => {
    const isMe = p.id === user.id;
    const rankCls = p.rank<=3?' r'+p.rank:'';
    const n = splitName(p.name);
    html += '<tr class="' + (isMe?'me ':'') + (p.rank===1?'top1':'') + '">'
      + '<td class="col-rank' + rankCls + '">' + p.rank + '.</td>'
      + '<td class="col-name"><span class="lastname">' + n.last + '</span><span class="firstname">' + n.first + '</span></td>'
      + '<td class="col-pts">' + p.pts + '</td>'
      + '<td class="col-sub">' + p.p5 + '</td>'
      + '<td class="col-sub">' + p.p3 + '</td>'
      + '<td class="col-sub">' + p.p1 + '</td>'
      + '</tr>';
  });
  document.getElementById('rankingList').innerHTML = html;
}

loadRanking();
</script>
</body>
</html>
