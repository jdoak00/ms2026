<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MS 2026 – Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    .topbar {
      background: #0F6E56;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-title {
      font-size: 17px;
      font-weight: 700;
    }

    .topbar-user {
      font-size: 13px;
      opacity: 0.85;
    }

    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
    }

    .deadline-banner {
      background: #fff3cd;
      border-bottom: 2px solid #f0a500;
      padding: 12px 20px;
      text-align: center;
    }

    .deadline-banner .label {
      font-size: 12px;
      color: #856404;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .deadline-banner .time {
      font-size: 18px;
      font-weight: 900;
      color: #533f03;
      margin-top: 2px;
    }

    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .menu-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-bottom: 1.5rem;
    }

    .menu-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .menu-row:last-child { border-bottom: none; }
    .menu-row:hover { background: #f8f8f8; }

    .menu-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .green { background: #e1f5ee; }
    .amber { background: #faeeda; }
    .blue  { background: #e6f1fb; }
    .purple { background: #eeedfe; }

    .menu-text { flex: 1; }
    .menu-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .menu-sub {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .arrow { color: #ccc; font-size: 18px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div>
      <div class="topbar-title">⚽ MS 2026</div>
      <div class="topbar-user" id="topbarUser">Načítám...</div>
    </div>
    <button class="logout-btn" onclick="logout()">Odhlásit</button>
  </div>

  <div class="deadline-banner">
    <div class="label">Nejbližší uzávěrka tipů</div>
    <div class="time" id="deadlineText">Načítám...</div>
  </div>

  <div class="content">

    <div class="section-label">Tipy</div>
    <div class="menu-card">
      <a class="menu-row" href="tipy-skupiny.html">
        <div class="menu-icon green">🏟️</div>
        <div class="menu-text">
          <div class="menu-title">Základní skupina</div>
          <div class="menu-sub">1. – 3. kolo</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="menu-row" href="tipy-playoff.html">
        <div class="menu-icon amber">🏆</div>
        <div class="menu-text">
          <div class="menu-title">Play-off</div>
          <div class="menu-sub">Osmifinále až finále</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="menu-row" href="tipy-special.html">
        <div class="menu-icon purple">⭐</div>
        <div class="menu-text">
          <div class="menu-title">Speciál</div>
          <div class="menu-sub">Vítěz šampionátu, nejlepší střelec</div>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>

    <div class="section-label">Výsledky</div>
    <div class="menu-card">
      <a class="menu-row" href="poradi.html">
        <div class="menu-icon blue">📊</div>
        <div class="menu-text">
          <div class="menu-title">Pořadí</div>
          <div class="menu-sub">Aktuální žebříček soutěžících</div>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://fizffhtzxjkeighdjhoi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpemZmaHR6eGprZWlnaGRqaG9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MjU1MDYsImV4cCI6MjA5NjIwMTUwNn0.baa-qYiKNsPRgwyiDvmQ9hq8QNmCuHXebZ-tvldcVYs';

    const user = JSON.parse(sessionStorage.getItem('ms2026_user'));
    if (!user) window.location.href = 'index.html';

    document.getElementById('topbarUser').textContent = user.full_name;

    async function query(table, params = '') {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      return res.json();
    }

    async function loadDeadline() {
      try {
        const now = new Date().toISOString();
        const data = await query('deadlines', `?deadline_time=gt.${now}&order=deadline_time.asc&limit=1`);
        const el = document.getElementById('deadlineText');
        if (data && data.length > 0) {
          const d = new Date(data[0].deadline_time);
          const formatted = d.toLocaleString('cs-CZ', {
            day: 'numeric', month: 'numeric', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
          el.textContent = `${data[0].round}: ${formatted}`;
        } else {
          el.textContent = 'Žádná nadcházející uzávěrka';
        }
      } catch(e) {
        document.getElementById('deadlineText').textContent = '—';
      }
    }

    function logout() {
      sessionStorage.removeItem('ms2026_user');
      window.location.href = 'index.html';
    }

    loadDeadline();
  </script>
</body>
</html>
