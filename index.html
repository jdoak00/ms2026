<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tipovací soutěž MS 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-placeholder {
      width: 130px;
      height: 130px;
      margin: 0 auto 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .app-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .app-sub {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }

    .deadline-banner {
      background: #fff3cd;
      border: 1.5px solid #f0a500;
      border-radius: 10px;
      padding: 10px 18px;
      margin-bottom: 1.25rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .deadline-banner .label {
      font-size: 12px;
      color: #856404;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .deadline-banner .time {
      font-size: 16px;
      font-weight: 800;
      color: #533f03;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      font-size: 15px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: #0F6E56;
      box-shadow: 0 0 0 3px rgba(15,110,86,0.1);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #0F6E56;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn:hover { background: #0a5240; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }

    .error {
      background: #fee;
      color: #c00;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 0.75rem;
      display: none;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <div class="logo-placeholder"><img src="logo.png" alt="FIFA World Cup 2026" /></div>
    <div class="app-title">Tipovací soutěž</div>
    <div class="app-sub">Mistrovství světa ve fotbale 2026</div>
  </div>

  <div class="deadline-banner" id="deadlineBanner">
    <div class="label">Nejbližší uzávěrka tipů</div>
    <div class="time" id="deadlineText">Načítám...</div>
  </div>

  <div class="card">
    <h2>Přihlášení</h2>
    <div class="field">
      <label for="username">Uživatelské jméno</label>
      <input type="text" id="username" placeholder="npr. novakjan" autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Heslo</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Přihlásit se</button>
    <div class="error" id="errorMsg">Nesprávné uživatelské jméno nebo heslo.</div>
  </div>

  <div class="footer">MS 2026 Tipovací soutěž &copy; 2026</div>

  <script>
    const SUPABASE_URL = 'https://fizffhtzxjkeighdjhoi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpemZmaHR6eGprZWlnaGRqaG9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MjU1MDYsImV4cCI6MjA5NjIwMTUwNn0.baa-qYiKNsPRgwyiDvmQ9hq8QNmCuHXebZ-tvldcVYs';

    async function query(table, params = '') {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      return res.json();
    }

    async function loadDeadline() {
      try {
        const now = new Date().toISOString();
        const data = await query('deadlines', `?deadline_time=gt.${now}&order=deadline_time.asc&limit=1`);
        const el = document.getElementById('deadlineText');
        if (data && data.length > 0) {
          const d = new Date(data[0].deadline_time);
          const formatted = d.toLocaleString('cs-CZ', {
            day: 'numeric', month: 'numeric', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
          el.textContent = `${data[0].round}: ${formatted}`;
        } else {
          el.textContent = 'Žádná nadcházející uzávěrka';
        }
      } catch(e) {
        document.getElementById('deadlineText').textContent = '—';
      }
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      if (!username || !password) {
        err.textContent = 'Vyplň uživatelské jméno i heslo.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Přihlašuji...';
      err.style.display = 'none';

      try {
        const data = await query('users', `?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&select=id,username,full_name,is_admin`);

        if (data && data.length > 0) {
          const user = data[0];
          sessionStorage.setItem('ms2026_user', JSON.stringify(user));
          if (user.is_admin) {
            window.location.href = 'menu.html';
          } else {
            window.location.href = 'menu.html';
          }
        } else {
          err.textContent = 'Nesprávné uživatelské jméno nebo heslo.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Přihlásit se';
        }
      } catch(e) {
        err.textContent = 'Chyba připojení. Zkus to znovu.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Přihlásit se';
      }
    }

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });

    loadDeadline();
  </script>
</body>
</html>
